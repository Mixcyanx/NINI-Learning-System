<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妮妮美術室 NiNi Art Studio - 完整功能版</title>
    
    <!-- 載入 Tailwind, React, Motion, Lucide -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bg: '#f7f4ef', panel: 'rgba(255, 255, 255, 0.88)', ink: '#2f2925', muted: '#756a63', accent: '#c58d5d', 'accent-deep': '#a66d3d', line: 'rgba(47, 41, 37, 0.08)' },
                    boxShadow: { soft: '0 18px 45px rgba(56, 37, 21, 0.12)' }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f7f4ef; background-image: radial-gradient(circle at top left, rgba(197, 141, 93, 0.16), transparent 28%); background-attachment: fixed; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>

    <!-- Firebase 核心邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAme6CI2tDRgjcFhVf21w9neEKycfaCPxM",
            authDomain: "nini-learning-system.firebaseapp.com",
            projectId: "nini-learning-system",
            storageBucket: "nini-learning-system.firebasestorage.app",
            messagingSenderId: "688657476620",
            appId: "1:688657476620:web:48a91c03d198731aa8d229",
            measurementId: "G-8N9B1EGT5B"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.googleProvider = new GoogleAuthProvider();
        // 將方法掛載到 window 方便 React 使用
        window.fb = { signInWithPopup, onAuthStateChanged, signOut, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp };
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => { if (iconRef.current) lucide.createIcons({ targets: [iconRef.current], icons: { [name]: lucide.icons[name] } }); }, [name]);
            return <i ref={iconRef} data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [user, setUser] = useState(null);
            const [artworks, setArtworks] = useState([]);
            const [loading, setLoading] = useState(true);
            
            // 表單狀態
            const [form, setForm] = useState({ title: '', artist: '', category: '', imageUrl: '', description: '' });

            useEffect(() => {
                const unsubAuth = window.fb.onAuthStateChanged(window.auth, (u) => { setUser(u); setLoading(false); });
                const q = window.fb.query(window.fb.collection(window.db, 'artworks'), window.fb.orderBy('createdAt', 'desc'));
                const unsubGallery = window.fb.onSnapshot(q, (snap) => {
                    setArtworks(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => { unsubAuth(); unsubGallery(); };
            }, []);

            const handleLogin = () => window.fb.signInWithPopup(window.auth, window.googleProvider);
            const handleLogout = () => window.fb.signOut(window.auth);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user) return alert('請先登入！');
                try {
                    await window.fb.addDoc(window.fb.collection(window.db, 'artworks'), {
                        ...form,
                        createdAt: window.fb.serverTimestamp(),
                        createdByName: user.displayName,
                        createdByUid: user.uid
                    });
                    alert('作品上傳成功！');
                    setForm({ title: '', artist: '', category: '', imageUrl: '', description: '' });
                    setCurrentPage('gallery');
                } catch (err) { alert('上傳失敗：' + err.message); }
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center font-bold text-muted">載入中...</div>;

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="sticky top-0 z-50 glass border-b border-line">
                        <div className="container mx-auto px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setCurrentPage('home')}>
                                <div className="w-10 h-10 rounded-xl bg-accent text-white grid place-items-center font-bold">妮</div>
                                <span className="font-black text-ink hidden sm:block">妮妮美術室</span>
                            </div>
                            <nav className="hidden lg:flex gap-2">
                                {['home', 'courses', 'gallery', 'member', 'contact'].map(p => (
                                    <button key={p} onClick={() => setCurrentPage(p)} className={`px-4 py-2 rounded-full font-bold text-sm ${currentPage === p ? 'bg-accent/15 text-accent-deep' : 'text-muted'}`}>
                                        {p === 'home' ? '首頁' : p === 'courses' ? '課程' : p === 'gallery' ? '畫廊' : p === 'member' ? '會員' : '聯絡'}
                                    </button>
                                ))}
                            </nav>
                            <div className="flex items-center gap-3">
                                {user ? (
                                    <div className="flex items-center gap-3">
                                        <img src={user.photoURL} className="w-8 h-8 rounded-full border border-accent/20" />
                                        <button onClick={handleLogout} className="text-xs font-bold text-muted hover:text-ink">登出</button>
                                    </div>
                                ) : (
                                    <button onClick={handleLogin} className="px-5 py-2 rounded-full bg-accent text-white font-bold text-sm">登入</button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="flex-grow container mx-auto px-4 py-8">
                        <AnimatePresence mode="wait">
                            {currentPage === 'home' && (
                                <motion.div key="home" initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} className="py-12">
                                    <div className="bg-panel border border-white/70 rounded-3xl shadow-soft p-10">
                                        <h1 className="text-5xl font-black text-ink mb-6">啟發孩子的藝術靈魂</h1>
                                        <p className="text-muted text-lg mb-8">在這裡，每一張畫都是一個故事。</p>
                                        <button onClick={()=>setCurrentPage('gallery')} className="px-8 py-4 bg-accent text-white font-black rounded-full shadow-lg shadow-accent/20">進入作品畫廊</button>
                                    </div>
                                </motion.div>
                            )}

                            {currentPage === 'gallery' && (
                                <motion.div key="gallery" initial={{opacity:0}} animate={{opacity:1}} className="grid md:grid-cols-3 gap-8">
                                    {artworks.map(art => (
                                        <div key={art.id} className="bg-white rounded-2xl border border-line overflow-hidden shadow-sm">
                                            <img src={art.imageUrl} className="w-full h-48 object-cover" />
                                            <div className="p-5">
                                                <h4 className="font-black text-lg">{art.title}</h4>
                                                <p className="text-muted text-sm mb-4">{art.description}</p>
                                                <div className="text-[10px] font-bold text-muted border-t pt-3 flex justify-between">
                                                    <span>作者：{art.artist}</span>
                                                    <span>由 {art.createdByName} 分享</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </motion.div>
                            )}

                            {currentPage === 'member' && (
                                <motion.div key="member" initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} className="max-w-xl mx-auto">
                                    {!user ? (
                                        <div className="text-center p-20 bg-white rounded-3xl border border-line">
                                            <h3 className="text-xl font-black mb-4">請先登入</h3>
                                            <button onClick={handleLogin} className="px-8 py-3 bg-accent text-white font-black rounded-full">使用 Google 登入</button>
                                        </div>
                                    ) : (
                                        <div className="bg-white p-8 rounded-3xl border border-line shadow-soft">
                                            <h3 className="text-2xl font-black mb-6">新增作品</h3>
                                            <form onSubmit={handleSubmit} className="space-y-4">
                                                <input required type="text" placeholder="作品標題" className="w-full p-3 border border-line rounded-xl" value={form.title} onChange={e=>setForm({...form, title:e.target.value})} />
                                                <input required type="text" placeholder="作者姓名" className="w-full p-3 border border-line rounded-xl" value={form.artist} onChange={e=>setForm({...form, artist:e.target.value})} />
                                                <select required className="w-full p-3 border border-line rounded-xl" value={form.category} onChange={e=>setForm({...form, category:e.target.value})}>
                                                    <option value="">選擇分類</option><option value="兒童創作">兒童創作</option><option value="素描">素描</option><option value="水彩">水彩</option>
                                                </select>
                                                <input required type="url" placeholder="圖片網址 (例如: https://picsum.photos/800/600)" className="w-full p-3 border border-line rounded-xl" value={form.imageUrl} onChange={e=>setForm({...form, imageUrl:e.target.value})} />
                                                <textarea placeholder="作品描述" className="w-full p-3 border border-line rounded-xl h-32" value={form.description} onChange={e=>setForm({...form, description:e.target.value})}></textarea>
                                                <button type="submit" className="w-full py-4 bg-accent text-white font-black rounded-full shadow-lg shadow-accent/20">確認上傳</button>
                                            </form>
                                        </div>
                                    )}
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
