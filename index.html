--- START OF FILE index.html ---
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妮妮美術室 NiNi Art Studio - 管理系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#f8f6f2',
                        panel: 'rgba(255, 255, 255, 0.85)',
                        ink: '#2d2723',
                        muted: '#786d66',
                        accent: '#d4a373',
                        'accent-deep': '#b5835a',
                        line: 'rgba(45, 39, 35, 0.08)',
                    },
                    boxShadow: { 'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)' }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8f6f2; }
        .serif { font-family: 'Noto Serif TC', serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #d4a373; border-radius: 50%; width: 20px; height: 20px; animate: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, setDoc, getDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAme6CI2tDRgjcFhVf21w9neEKycfaCPxM",
            authDomain: "nini-learning-system.firebaseapp.com",
            projectId: "nini-learning-system",
            storageBucket: "nini-learning-system.appspot.com",
            messagingSenderId: "688657476620",
            appId: "1:688657476620:web:48a91c03d198731aa8d229"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.storage = getStorage(app);
        window.googleProvider = new GoogleAuthProvider();
        window.fb = { 
            signInWithPopup, onAuthStateChanged, signOut, collection, addDoc, deleteDoc, 
            doc, updateDoc, setDoc, getDoc, query, orderBy, onSnapshot, serverTimestamp,
            ref, uploadBytes, getDownloadURL
        };
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) lucide.createIcons({ targets: [iconRef.current], icons: { [name]: lucide.icons[name] } });
            }, [name]);
            return <i ref={iconRef} data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- Firebase 工具函數 ---
        const uploadFile = async (file, path) => {
            if (!file) return null;
            const storageRef = window.fb.ref(window.storage, `${path}/${Date.now()}_${file.name}`);
            const snapshot = await window.fb.uploadBytes(storageRef, file);
            return await window.fb.getDownloadURL(snapshot.ref);
        };

        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [studioInfo, setStudioInfo] = useState({ 
                logoUrl: 'https://cdn-icons-png.flaticon.com/512/2970/2970785.png', 
                address: '新北市板橋區藝術大道 101 號', 
                phone: '02-2345-6789',
                email: 'hello@niniart.com'
            });
            const [teachers, setTeachers] = useState([]);
            const [artworks, setArtworks] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // 1. 監聽 Auth
                const unsubAuth = window.fb.onAuthStateChanged(window.auth, (u) => {
                    setUser(u);
                    if (sessionStorage.getItem('isNiNiAdmin') === 'true') setIsAdmin(true);
                    setLoading(false);
                });

                // 2. 監聽工作室資訊
                const unsubInfo = window.fb.onSnapshot(window.fb.doc(window.db, 'settings', 'studio'), (doc) => {
                    if (doc.exists()) setStudioInfo(doc.data());
                });

                // 3. 監聽老師列表
                const unsubTeachers = window.fb.onSnapshot(window.fb.collection(window.db, 'teachers'), (snap) => {
                    setTeachers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                // 4. 監聽作品
                const qArt = window.fb.query(window.fb.collection(window.db, 'artworks'), window.fb.orderBy('createdAt', 'desc'));
                const unsubArt = window.fb.onSnapshot(qArt, (snap) => {
                    setArtworks(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                return () => { unsubAuth(); unsubInfo(); unsubTeachers(); unsubArt(); };
            }, []);

            const handleLogoChange = async (e) => {
                if (!isAdmin) return;
                const file = e.target.files[0];
                if (file) {
                    const url = await uploadFile(file, 'branding');
                    await window.fb.setDoc(window.fb.doc(window.db, 'settings', 'studio'), { ...studioInfo, logoUrl: url });
                }
            };

            const updateInfo = async (field, value) => {
                const newData = { ...studioInfo, [field]: value };
                setStudioInfo(newData);
                await window.fb.setDoc(window.fb.doc(window.db, 'settings', 'studio'), newData);
            };

            if (loading) return <div className="h-screen flex items-center justify-center">載入中...</div>;

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="fixed top-0 w-full z-50 glass border-b border-line px-6 py-3">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4 cursor-pointer relative group" onClick={() => setCurrentPage('home')}>
                                <div className="relative w-12 h-12">
                                    <img src={studioInfo.logoUrl} className="w-full h-full object-contain" />
                                    {isAdmin && (
                                        <label className="absolute inset-0 bg-black/40 rounded-lg flex items-center justify-center opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity">
                                            <Icon name="Camera" size={16} className="text-white"/>
                                            <input type="file" className="hidden" accept="image/*" onChange={handleLogoChange} />
                                        </label>
                                    )}
                                </div>
                                <div>
                                    <h1 className="serif text-xl font-black text-ink">妮妮美術室</h1>
                                    <p className="text-[10px] font-bold text-muted uppercase tracking-widest">NiNi Art Studio</p>
                                </div>
                            </div>
                            
                            <div className="hidden lg:flex items-center gap-1">
                                {['home', 'courses', 'gallery', 'contact', 'member'].map(id => (
                                    <button key={id} onClick={() => setCurrentPage(id)} className={`px-5 py-2 rounded-full text-sm font-bold transition-all ${currentPage === id ? 'bg-accent text-white' : 'text-muted hover:bg-stone-100'}`}>
                                        {id === 'home' ? '首頁' : id === 'courses' ? '課程' : id === 'gallery' ? '學生畫廊' : id === 'contact' ? '聯絡我們' : '會員'}
                                    </button>
                                ))}
                            </div>

                            <div className="flex items-center gap-3">
                                {user ? (
                                    <img src={user.photoURL} className="w-9 h-9 rounded-full border border-line" onClick={() => setCurrentPage('member')} />
                                ) : (
                                    <button onClick={() => window.fb.signInWithPopup(window.auth, window.googleProvider)} className="px-5 py-2 rounded-full bg-ink text-white text-xs font-bold">登入</button>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow pt-28 pb-20 px-6 max-w-7xl mx-auto w-full">
                        <AnimatePresence mode="wait">
                            {currentPage === 'home' && (
                                <motion.div initial={{opacity:0}} animate={{opacity:1}} className="text-center py-20">
                                    <h2 className="serif text-6xl text-ink mb-6 italic">Where Creativity Blooms</h2>
                                    <p className="text-muted text-xl max-w-2xl mx-auto mb-12">這是一個充滿溫度的空間，讓每個孩子都能在畫筆下發現屬於自己的色彩世界。</p>
                                    <button onClick={()=>setCurrentPage('gallery')} className="px-12 py-5 bg-accent text-white rounded-2xl font-black shadow-xl shadow-accent/30 hover:-translate-y-1 transition-all">參觀小小畫廊</button>
                                </motion.div>
                            )}

                            {currentPage === 'gallery' && (
                                <GallerySection artworks={artworks} isAdmin={isAdmin} user={user} />
                            )}

                            {currentPage === 'contact' && (
                                <ContactSection 
                                    info={studioInfo} 
                                    isAdmin={isAdmin} 
                                    onUpdate={updateInfo} 
                                    teachers={teachers} 
                                />
                            )}

                            {currentPage === 'member' && (
                                <div className="max-w-md mx-auto py-12">
                                    {!user ? (
                                        <div className="text-center">請先登入</div>
                                    ) : (
                                        <div className="bg-white p-8 rounded-3xl border border-line">
                                            <div className="flex items-center gap-4 mb-8">
                                                <img src={user.photoURL} className="w-16 h-16 rounded-full" />
                                                <div>
                                                    <div className="font-black text-lg">{user.displayName}</div>
                                                    <div className="text-xs text-muted">{isAdmin ? '👑 網站管理員' : '一般會員'}</div>
                                                </div>
                                            </div>
                                            {!isAdmin && (
                                                <div className="pt-4 border-t">
                                                    <p className="text-xs font-bold text-muted mb-2">管理者驗證</p>
                                                    <input type="password" placeholder="輸入密碼" className="w-full p-3 border border-line rounded-xl mb-3" onKeyDown={(e) => {
                                                        if(e.key === 'Enter' && e.target.value === '720205') {
                                                            setIsAdmin(true);
                                                            sessionStorage.setItem('isNiNiAdmin', 'true');
                                                            alert('已開啟管理者模式');
                                                        }
                                                    }} />
                                                </div>
                                            )}
                                            <button onClick={() => {window.fb.signOut(window.auth); setIsAdmin(false); sessionStorage.removeItem('isNiNiAdmin');}} className="w-full py-3 text-rose-500 font-bold border border-rose-100 rounded-xl hover:bg-rose-50">登出帳號</button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {['courses'].includes(currentPage) && <div className="text-center py-20 text-muted">課程資訊內容製作中...</div>}
                        </AnimatePresence>
                    </main>
                </div>
            );
        }

        // --- 子組件：畫廊區塊 ---
        const GallerySection = ({ artworks, isAdmin, user }) => {
            const [isUploading, setIsUploading] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(false);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                const title = prompt("請輸入作品標題：");
                const artist = prompt("請輸入創作者姓名：");
                if (!file || !title || !artist) return;

                setUploadProgress(true);
                try {
                    const url = await uploadFile(file, 'artworks');
                    await window.fb.addDoc(window.fb.collection(window.db, 'artworks'), {
                        title, artist, imageUrl: url, category: '精選作品',
                        createdBy: user?.uid || 'guest',
                        createdAt: window.fb.serverTimestamp()
                    });
                } catch (err) { alert('上傳失敗'); }
                setUploadProgress(false);
            };

            return (
                <div className="space-y-12">
                    <div className="flex justify-between items-end">
                        <div>
                            <h2 className="serif text-4xl font-black text-ink mb-2">小小藝術家畫廊</h2>
                            <p className="text-muted">在這裡，每一幅畫都述說著一個純真的故事。</p>
                        </div>
                        <label className={`flex items-center gap-2 px-6 py-3 bg-ink text-white rounded-xl font-bold cursor-pointer hover:bg-accent transition-all ${uploadProgress ? 'opacity-50 pointer-events-none' : ''}`}>
                            <Icon name={uploadProgress ? "Loader" : "Upload"} size={18} className={uploadProgress ? 'animate-spin' : ''}/>
                            {uploadProgress ? '上傳中...' : '上傳作品'}
                            <input type="file" className="hidden" accept="image/png, image/jpeg, image/jpg" onChange={handleFileUpload} />
                        </label>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
                        {artworks.map(art => (
                            <motion.div layout key={art.id} className="group bg-white p-4 rounded-[2rem] border border-line shadow-sm hover:shadow-xl transition-all">
                                <div className="aspect-square rounded-[1.5rem] overflow-hidden mb-4 relative">
                                    <img src={art.imageUrl} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                    {isAdmin && (
                                        <button onClick={() => window.fb.deleteDoc(window.fb.doc(window.db, 'artworks', art.id))} className="absolute top-2 right-2 p-2 bg-white/90 rounded-full text-rose-500 shadow-lg opacity-0 group-hover:opacity-100">
                                            <Icon name="Trash2" size={16}/>
                                        </button>
                                    )}
                                </div>
                                <h4 className="font-black text-ink">{art.title}</h4>
                                <p className="text-xs text-muted italic">By {art.artist}</p>
                            </motion.div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- 子組件：聯絡與老師管理 ---
        const ContactSection = ({ info, isAdmin, onUpdate, teachers }) => {
            const [isAdding, setIsAdding] = useState(false);
            const [newTeacher, setNewTeacher] = useState({ name: '', title: '', line: '', avatar: '' });

            const addTeacher = async () => {
                if(!newTeacher.name) return;
                await window.fb.addDoc(window.fb.collection(window.db, 'teachers'), newTeacher);
                setIsAdding(false);
                setNewTeacher({ name: '', title: '', line: '', avatar: '' });
            };

            const handleTeacherAvatar = async (e) => {
                const url = await uploadFile(e.target.files[0], 'teachers');
                setNewTeacher({ ...newTeacher, avatar: url });
            };

            return (
                <div className="space-y-20">
                    <div className="grid lg:grid-cols-2 gap-12">
                        <div className="bg-ink p-12 rounded-[3rem] text-white">
                            <h2 className="serif text-4xl mb-12">預約參觀</h2>
                            <div className="space-y-10">
                                <div className="flex gap-5">
                                    <Icon name="MapPin" className="text-accent mt-1" />
                                    <div className="flex-grow">
                                        <div className="text-[10px] font-bold opacity-40 uppercase mb-1">Studio Address</div>
                                        {isAdmin ? (
                                            <input value={info.address} onChange={e => onUpdate('address', e.target.value)} className="bg-white/10 w-full p-2 rounded text-sm outline-none" />
                                        ) : (
                                            <div className="font-bold text-lg">{info.address}</div>
                                        )}
                                    </div>
                                </div>
                                <div className="flex gap-5">
                                    <Icon name="Phone" className="text-accent mt-1" />
                                    <div className="flex-grow">
                                        <div className="text-[10px] font-bold opacity-40 uppercase mb-1">Contact Phone</div>
                                        {isAdmin ? (
                                            <input value={info.phone} onChange={e => onUpdate('phone', e.target.value)} className="bg-white/10 w-full p-2 rounded text-sm outline-none" />
                                        ) : (
                                            <div className="font-bold text-lg">{info.phone}</div>
                                        )}
                                    </div>
                                </div>
                                <div className="flex gap-5">
                                    <Icon name="Mail" className="text-accent mt-1" />
                                    <div className="flex-grow">
                                        <div className="text-[10px] font-bold opacity-40 uppercase mb-1">Email Support</div>
                                        <div className="font-bold text-lg">{info.email}</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div>
                            <div className="flex justify-between items-center mb-8">
                                <h3 className="serif text-3xl text-ink font-black italic underline decoration-accent underline-offset-8">認識老師們</h3>
                                {isAdmin && (
                                    <button onClick={() => setIsAdding(true)} className="p-2 bg-stone-100 rounded-full hover:bg-accent hover:text-white transition-all"><Icon name="Plus" /></button>
                                )}
                            </div>
                            <div className="grid grid-cols-1 gap-6">
                                {teachers.map(t => (
                                    <div key={t.id} className="flex items-center gap-6 p-6 bg-white rounded-3xl border border-line group">
                                        <img src={t.avatar || 'https://cdn-icons-png.flaticon.com/512/1998/1998592.png'} className="w-20 h-20 rounded-2xl object-cover bg-stone-50" />
                                        <div className="flex-grow">
                                            <h4 className="font-black text-xl text-ink">{t.name}</h4>
                                            <p className="text-sm text-muted mb-2">{t.title}</p>
                                            <a href={`https://line.me/ti/p/${t.line}`} className="inline-flex items-center gap-2 text-xs font-bold text-accent">
                                                <Icon name="MessageCircle" size={14}/> 聯繫老師 (LINE)
                                            </a>
                                        </div>
                                        {isAdmin && (
                                            <button onClick={() => window.fb.deleteDoc(window.fb.doc(window.db, 'teachers', t.id))} className="opacity-0 group-hover:opacity-100 text-rose-300 hover:text-rose-500 transition-opacity"><Icon name="X" size={18}/></button>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {isAdding && (
                        <div className="fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-6 backdrop-blur-sm">
                            <motion.div initial={{scale:0.9}} animate={{scale:1}} className="bg-white p-8 rounded-[2rem] max-w-sm w-full">
                                <h4 className="text-xl font-black mb-6">新增老師資料</h4>
                                <div className="space-y-4">
                                    <div className="flex justify-center mb-4">
                                        <label className="w-20 h-20 bg-stone-100 rounded-2xl flex items-center justify-center cursor-pointer overflow-hidden border-2 border-dashed border-stone-200">
                                            {newTeacher.avatar ? <img src={newTeacher.avatar} className="w-full h-full object-cover" /> : <Icon name="UserPlus" className="text-stone-300"/>}
                                            <input type="file" className="hidden" onChange={handleTeacherAvatar} />
                                        </label>
                                    </div>
                                    <input className="w-full p-3 border border-line rounded-xl" placeholder="姓名" value={newTeacher.name} onChange={e=>setNewTeacher({...newTeacher, name:e.target.value})} />
                                    <input className="w-full p-3 border border-line rounded-xl" placeholder="職稱 (例：專業油畫老師)" value={newTeacher.title} onChange={e=>setNewTeacher({...newTeacher, title:e.target.value})} />
                                    <input className="w-full p-3 border border-line rounded-xl" placeholder="LINE ID" value={newTeacher.line} onChange={e=>setNewTeacher({...newTeacher, line:e.target.value})} />
                                    <div className="flex gap-2 pt-4">
                                        <button onClick={addTeacher} className="flex-1 py-3 bg-accent text-white font-black rounded-xl shadow-lg shadow-accent/20">儲存</button>
                                        <button onClick={()=>setIsAdding(false)} className="px-6 py-3 bg-stone-100 text-muted font-bold rounded-xl">取消</button>
                                    </div>
                                </div>
                            </motion.div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
