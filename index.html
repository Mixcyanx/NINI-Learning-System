<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妮妮美術室 NiNi Art Studio | 官方旗艦網站</title>
    
    <!-- 1. 核心樣式與微軟正黑體優化 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#d97706', // 琥珀焦糖
                        accent: '#92400e',
                        light: { bg: '#f5f2ea', card: '#ffffff', text: '#2d2926', muted: '#7a746e' },
                        dark: { bg: '#1a1816', card: '#262321', text: '#f5f2ea', muted: '#a8a29e' }
                    },
                    borderRadius: { '4xl': '2rem', '5xl': '3rem' },
                    boxShadow: { 'art': '0 25px 60px -12px rgba(217, 119, 6, 0.15)' }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* 強制微軟正黑體 */
        body, button, input, textarea, select {
            font-family: "Microsoft JhengHei", "微軟正黑體", "Heiti TC", sans-serif !important;
        }

        .serif { font-family: "Noto Serif TC", serif; font-weight: 900; }
        
        body { 
            background-color: #f5f2ea;
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark body { background-color: #1a1816; }

        /* 米色模式下的高級磨砂 */
        .glass { 
            backdrop-filter: blur(20px); 
            background: rgba(245, 242, 234, 0.8); 
        }
        .dark .glass { 
            background: rgba(26, 24, 22, 0.85); 
        }

        /* 藝術畫布紋理 */
        .canvas-pattern {
            background-image: radial-gradient(#d97706 0.6px, transparent 0.6px);
            background-size: 32px 32px;
            opacity: 0.12;
        }

        /* 瀑布流排版優化 */
        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        /* 上傳區域動態邊框 */
        .dash-border {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='40' ry='40' stroke='%23D97706FF' stroke-width='3' stroke-dasharray='12%2c 18' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
        }

        /* 動態進度條 */
        .progress-bar { height: 4px; background: #d97706; transition: width 0.3s ease; }
    </style>

    <!-- 2. Firebase 全功能整合 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, setDoc, getDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // Firebase 設定 (請確保您的 Firebase Storage Rules 已改為 allow read, write: if true;)
        const firebaseConfig = {
            apiKey: "AIzaSyAme6CI2tDRgjcFhVf21w9neEKycfaCPxM",
            authDomain: "nini-learning-system.firebaseapp.com",
            projectId: "nini-learning-system",
            storageBucket: "nini-learning-system.firebasestorage.app",
            messagingSenderId: "688657476620",
            appId: "1:688657476620:web:48a91c03d198731aa8d229"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.storage = getStorage(app);
        window.googleProvider = new GoogleAuthProvider();
        window.fb = { 
            signInWithPopup, onAuthStateChanged, signOut, collection, addDoc, deleteDoc, 
            doc, updateDoc, setDoc, getDoc, query, orderBy, onSnapshot, serverTimestamp,
            ref, uploadBytes, getDownloadURL
        };
    </script>
</head>
<body class="text-light-text dark:text-dark-text min-h-screen relative antialiased">
    
    <!-- 背景層 -->
    <div class="fixed inset-0 canvas-pattern -z-10 pointer-events-none"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- 通用圖示元件 ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) lucide.createIcons({ targets: [iconRef.current], icons: { [name]: lucide.icons[name] } });
            }, [name]);
            return <i ref={iconRef} data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- 核心上傳函數 (支援 Firebase Storage) ---
        const uploadFile = async (file, folder) => {
            if (!file) return null;
            try {
                const storageRef = window.fb.ref(window.storage, `${folder}/${Date.now()}_${file.name}`);
                const snapshot = await window.fb.uploadBytes(storageRef, file);
                return await window.fb.getDownloadURL(snapshot.ref);
            } catch (err) {
                console.error(err);
                alert("上傳失敗：可能是 Firebase Storage 權限未開啟或額度已滿。");
                return null;
            }
        };

        // --- 主程式進入點 ---
        function App() {
            const [isDark, setIsDark] = useState(false);
            const [currentPage, setCurrentPage] = useState('home');
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [loading, setLoading] = useState(true);

            // 數據狀態
            const [studio, setStudio] = useState({
                logo: 'https://cdn-icons-png.flaticon.com/512/2970/2970785.png',
                address: '新北市板橋區藝術大道 101 號',
                phone: '02-2345-6789',
                email: 'hello@niniart.com',
                heroTitle: '釋放孩子的色彩天賦',
                heroDesc: '我們不教孩子畫畫，我們引導他們如何觀看世界。提供一個專業、寧靜且充滿可能性的空間。',
                aboutTitle: '關於妮妮美術室',
                aboutText: '妮妮美術室致力於推廣全感官美感教育，從心出發，讓藝術成為生活的一部分。'
            });
            const [artworks, setArtworks] = useState([]);
            const [teachers, setTeachers] = useState([]);
            const [courses, setCourses] = useState([]);
            const [faqs, setFaqs] = useState([]);

            // 初始化數據監聽
            useEffect(() => {
                if (isDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');

                const unsubAuth = window.fb.onAuthStateChanged(window.auth, (u) => {
                    setUser(u);
                    if (sessionStorage.getItem('is_nini_admin') === 'true') setIsAdmin(true);
                    setLoading(false);
                });

                // 即時數據同步
                const unsubStudio = window.fb.onSnapshot(window.fb.doc(window.db, 'settings', 'studio'), d => d.exists() && setStudio(d.data()));
                const unsubArt = window.fb.onSnapshot(window.fb.query(window.fb.collection(window.db, 'artworks'), window.fb.orderBy('createdAt', 'desc')), s => setArtworks(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubTeachers = window.fb.onSnapshot(window.fb.collection(window.db, 'teachers'), s => setTeachers(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubCourses = window.fb.onSnapshot(window.fb.collection(window.db, 'courses'), s => setCourses(s.docs.map(d=>({id:d.id, ...d.data()}))));
                const unsubFaq = window.fb.onSnapshot(window.fb.collection(window.db, 'faqs'), s => setFaqs(s.docs.map(d=>({id:d.id, ...d.data()}))));

                return () => { unsubAuth(); unsubStudio(); unsubArt(); unsubTeachers(); unsubCourses(); unsubFaq(); };
            }, [isDark]);

            // 管理權限驗證
            const unlockAdmin = (pwd) => {
                if (pwd === "720205") {
                    setIsAdmin(true);
                    sessionStorage.setItem('is_nini_admin', 'true');
                    alert("✨ 歡迎回來，妮妮老師。已開啟管理權限。");
                } else { alert("密碼錯誤，請重試。"); }
            };

            const updateStudio = async (field, val) => {
                const newData = { ...studio, [field]: val };
                setStudio(newData);
                await window.fb.setDoc(window.fb.doc(window.db, 'settings', 'studio'), newData);
            };

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-light-bg dark:bg-dark-bg">
                    <div className="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    {/* 頂部導航欄 */}
                    <nav className="fixed top-0 w-full z-50 glass border-b border-primary/5 px-6 md:px-12 py-5">
                        <div className="max-w-[1400px] mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4 cursor-pointer group" onClick={() => setCurrentPage('home')}>
                                <div className="relative w-12 h-12 bg-white rounded-2xl p-1 shadow-xl overflow-hidden">
                                    <img src={studio.logo} className="w-full h-full object-contain" />
                                    {isAdmin && (
                                        <label className="absolute inset-0 bg-primary/60 flex items-center justify-center opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity">
                                            <Icon name="Camera" size={16} className="text-white" />
                                            <input type="file" className="hidden" onChange={async e => {
                                                const url = await uploadFile(e.target.files[0], 'branding');
                                                if(url) updateStudio('logo', url);
                                            }} />
                                        </label>
                                    )}
                                </div>
                                <div>
                                    <h1 className="text-xl font-black text-primary tracking-tight">妮妮美術室</h1>
                                    <p className="text-[10px] font-bold opacity-30 uppercase tracking-[0.3em]">NiNi Art Studio</p>
                                </div>
                            </div>

                            <div className="hidden lg:flex items-center gap-1">
                                {[
                                    {id:'home', name:'首頁'},
                                    {id:'courses', name:'課程規劃'},
                                    {id:'gallery', name:'學生畫廊'},
                                    {id:'teachers', name:'專業團隊'},
                                    {id:'faq', name:'問答'},
                                    {id:'member', name:'會員'}
                                ].map(nav => (
                                    <button 
                                        key={nav.id} 
                                        onClick={() => setCurrentPage(nav.id)}
                                        className={`px-6 py-2.5 rounded-full text-sm font-bold transition-all ${currentPage === nav.id ? 'bg-primary text-white shadow-lg' : 'hover:bg-primary/5'}`}
                                    >
                                        {nav.name}
                                    </button>
                                ))}
                                <div className="w-[1px] h-6 bg-primary/20 mx-4"></div>
                                <button onClick={() => setIsDark(!isDark)} className="p-2.5 rounded-2xl bg-primary/5 text-primary hover:bg-primary/10">
                                    <Icon name={isDark ? "Sun" : "Moon"} size={20} />
                                </button>
                            </div>

                            <button onClick={() => setIsMenuOpen(true)} className="lg:hidden p-2 text-primary">
                                <Icon name="Menu" size={32} />
                            </button>
                        </div>
                    </nav>

                    {/* 行動版全屏選單 */}
                    <AnimatePresence>
                        {isMenuOpen && (
                            <motion.div initial={{ x: '100%' }} animate={{ x: 0 }} exit={{ x: '100%' }} transition={{ type: 'spring', damping: 30 }} className="fixed inset-0 z-[60] bg-light-bg dark:bg-dark-bg p-8 flex flex-col">
                                <div className="flex justify-between items-center mb-16">
                                    <div className="serif text-2xl font-black text-primary italic">Navigation.</div>
                                    <button onClick={() => setIsMenuOpen(false)} className="p-3 bg-primary/5 rounded-full text-primary"><Icon name="X" size={32}/></button>
                                </div>
                                <div className="flex flex-col gap-10">
                                    {['home', 'courses', 'gallery', 'teachers', 'faq', 'member'].map(id => (
                                        <button key={id} onClick={() => { setCurrentPage(id); setIsMenuOpen(false); }} className={`text-5xl font-black text-left tracking-tighter ${currentPage === id ? 'text-primary' : 'opacity-20'}`}>
                                            {id === 'home' ? '首頁' : id === 'courses' ? '課程規劃' : id === 'gallery' ? '展覽' : id === 'teachers' ? '團隊' : id === 'faq' ? '問題' : '會員'}
                                        </button>
                                    ))}
                                </div>
                                <div className="mt-auto flex justify-between items-center pt-8 border-t border-primary/10">
                                    <p className="text-xs font-bold opacity-30 uppercase tracking-widest">NiNi Art Studio &copy; 2026</p>
                                    <button onClick={() => setIsDark(!isDark)} className="p-5 rounded-3xl bg-primary/10 text-primary"><Icon name={isDark ? "Sun" : "Moon"} size={28} /></button>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* 主要內容區域 */}
                    <main className="pt-36 pb-24 px-6 md:px-12 max-w-[1400px] mx-auto w-full">
                        <AnimatePresence mode="wait">
                            {currentPage === 'home' && (
                                <HomeSection key="home" studio={studio} isAdmin={isAdmin} onUpdate={updateStudio} onGo={() => setCurrentPage('courses')} />
                            )}
                            {currentPage === 'courses' && (
                                <CourseSection key="courses" courses={courses} isAdmin={isAdmin} />
                            )}
                            {currentPage === 'gallery' && (
                                <GallerySection key="gallery" artworks={artworks} isAdmin={isAdmin} user={user} uploadFile={uploadFile} />
                            )}
                            {currentPage === 'teachers' && (
                                <TeacherSection key="teachers" teachers={teachers} isAdmin={isAdmin} uploadFile={uploadFile} />
                            )}
                            {currentPage === 'faq' && (
                                <FaqSection key="faq" faqs={faqs} isAdmin={isAdmin} />
                            )}
                            {currentPage === 'member' && (
                                <MemberSection key="member" user={user} isAdmin={isAdmin} onVerify={unlockAdmin} studio={studio} onUpdate={updateStudio} />
                            )}
                        </AnimatePresence>
                    </main>

                    {/* 頁尾 */}
                    <footer className="py-24 bg-white dark:bg-dark-card border-t border-primary/5">
                        <div className="max-w-[1400px] mx-auto px-12 grid md:grid-cols-2 lg:grid-cols-4 gap-16">
                            <div className="col-span-1 md:col-span-2">
                                <div className="text-4xl font-black text-primary mb-8 italic">NiNi Art Studio.</div>
                                <p className="text-lg opacity-50 font-bold max-w-md leading-relaxed mb-10">藝術是心靈的鏡子。我們致力於打造一個沒有邊界的藝術空間，讓每一顆靈感都能在這裡找到屬於自己的色彩與形狀。</p>
                                <div className="flex gap-4">
                                    <a href="#" className="w-12 h-12 rounded-2xl bg-primary/5 flex items-center justify-center text-primary hover:bg-primary hover:text-white transition-all"><Icon name="Instagram" /></a>
                                    <a href="#" className="w-12 h-12 rounded-2xl bg-primary/5 flex items-center justify-center text-primary hover:bg-primary hover:text-white transition-all"><Icon name="Facebook" /></a>
                                </div>
                            </div>
                            <div>
                                <h5 className="font-black mb-8 uppercase tracking-[0.3em] text-primary text-xs">導覽探索</h5>
                                <ul className="space-y-5 text-sm font-bold opacity-60">
                                    <li><button onClick={()=>setCurrentPage('home')}>關於我們</button></li>
                                    <li><button onClick={()=>setCurrentPage('courses')}>所有課程</button></li>
                                    <li><button onClick={()=>setCurrentPage('gallery')}>學生作品</button></li>
                                    <li><button onClick={()=>setCurrentPage('teachers')}>專業師資</button></li>
                                </ul>
                            </div>
                            <div>
                                <h5 className="font-black mb-8 uppercase tracking-[0.3em] text-primary text-xs">聯繫資訊</h5>
                                <p className="text-sm font-bold opacity-60 mb-3">{studio.address}</p>
                                <p className="text-sm font-bold opacity-60 mb-3">{studio.phone}</p>
                                <p className="text-sm font-bold opacity-60">{studio.email}</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        // --- 子區塊：首頁 (Hero & About) ---
        const HomeSection = ({ studio, isAdmin, onUpdate, onGo }) => (
            <motion.div initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0 }} className="space-y-48">
                <section className="flex flex-col lg:flex-row items-center gap-24">
                    <div className="lg:w-1/2 space-y-12">
                        <div className="inline-flex items-center gap-3 px-5 py-2.5 rounded-full bg-primary/5 text-primary text-xs font-black tracking-widest uppercase shadow-sm">
                            <span className="w-2.5 h-2.5 rounded-full bg-primary animate-pulse"></span>
                            2026 春季學期招生中
                        </div>
                        <h2 className="text-7xl md:text-9xl font-black leading-[0.9] tracking-tighter">
                            {isAdmin ? <input className="bg-transparent border-b-4 border-primary/20 outline-none w-full" defaultValue={studio.heroTitle} onBlur={e=>onUpdate('heroTitle', e.target.value)} /> : studio.heroTitle}
                        </h2>
                        <p className="text-2xl opacity-50 font-bold leading-relaxed max-w-lg">
                            {isAdmin ? <textarea className="bg-transparent border-2 border-primary/10 rounded-3xl p-6 w-full h-40 outline-none" defaultValue={studio.heroDesc} onBlur={e=>onUpdate('heroDesc', e.target.value)} /> : studio.heroDesc}
                        </p>
                        <div className="flex flex-col sm:flex-row gap-5">
                            <button onClick={onGo} className="px-12 py-6 bg-primary text-white rounded-[2.5rem] font-black shadow-2xl shadow-primary/40 hover:scale-105 active:scale-95 transition-all text-lg">探索課程規劃</button>
                            <button className="px-12 py-6 bg-white dark:bg-white/5 border-2 border-primary/10 rounded-[2.5rem] font-black hover:bg-primary/5 transition-all text-lg">預約參觀空間</button>
                        </div>
                    </div>
                    <div className="lg:w-1/2 relative">
                        <div className="absolute -inset-16 bg-primary/5 rounded-[6rem] -rotate-6 blur-[80px] -z-10"></div>
                        <div className="relative rounded-[4rem] overflow-hidden shadow-art group">
                            <img src="https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&w=1200" className="w-full h-[700px] object-cover transition-transform duration-1000 group-hover:scale-110" />
                        </div>
                    </div>
                </section>

                <section className="bg-white dark:bg-dark-card p-16 md:p-32 rounded-[5rem] shadow-sm border border-primary/5 text-center space-y-12">
                    <h3 className="text-5xl md:text-6xl font-black italic underline decoration-primary/10 decoration-[16px] underline-offset-8">
                        {isAdmin ? <input className="bg-transparent text-center border-b border-primary/20 outline-none w-full" defaultValue={studio.aboutTitle} onBlur={e=>onUpdate('aboutTitle', e.target.value)} /> : studio.aboutTitle}
                    </h3>
                    <p className="text-2xl md:text-4xl leading-tight opacity-40 font-bold max-w-4xl mx-auto">
                        {isAdmin ? <textarea className="bg-transparent text-center border border-primary/10 rounded-3xl p-8 w-full h-48 outline-none" defaultValue={studio.aboutText} onBlur={e=>onUpdate('aboutText', e.target.value)} /> : studio.aboutText}
                    </p>
                </section>
            </motion.div>
        );

        // --- 子區塊：課程管理 ---
        const CourseSection = ({ courses, isAdmin }) => {
            const [isAdding, setIsAdding] = useState(false);
            const [temp, setTemp] = useState({ title: '', age: '', price: '', desc: '', icon: 'Palette' });

            const addCourse = async () => {
                await window.fb.addDoc(window.fb.collection(window.db, 'courses'), { ...temp, createdAt: window.fb.serverTimestamp() });
                setIsAdding(false);
            };

            return (
                <div className="space-y-20 py-12">
                    <div className="flex flex-col md:flex-row justify-between items-end gap-10">
                        <div>
                            <h2 className="text-6xl font-black italic tracking-tighter underline decoration-primary/20 decoration-8 underline-offset-8">Course Map.</h2>
                            <p className="opacity-40 font-bold tracking-[0.3em] uppercase text-xs mt-4">給予不同年齡層最合適的引導式教育</p>
                        </div>
                        {isAdmin && (
                            <button onClick={() => setIsAdding(true)} className="px-10 py-5 bg-primary text-white rounded-3xl font-black shadow-xl shadow-primary/20">新增課程類別 +</button>
                        )}
                    </div>

                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-10">
                        {courses.map(course => (
                            <div key={course.id} className="p-12 rounded-[4rem] bg-white dark:bg-dark-card border border-primary/5 shadow-sm hover:shadow-art transition-all group relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-10 opacity-[0.03] group-hover:scale-125 transition-transform"><Icon name={course.icon || 'Palette'} size={160} /></div>
                                <div className="relative z-10 space-y-8">
                                    <div className="w-16 h-16 rounded-3xl bg-primary/10 text-primary flex items-center justify-center"><Icon name={course.icon || 'Palette'} size={28} /></div>
                                    <h4 className="text-4xl font-black tracking-tight">{course.title}</h4>
                                    <div className="flex gap-3">
                                        <span className="px-4 py-1.5 rounded-full bg-primary/5 text-primary text-xs font-black uppercase tracking-widest">{course.age}</span>
                                    </div>
                                    <p className="text-lg opacity-40 font-bold leading-relaxed">{course.desc}</p>
                                    <div className="pt-8 border-t border-primary/5 flex justify-between items-center">
                                        <div className="text-3xl font-black text-primary italic">{course.price}</div>
                                        {isAdmin && <button onClick={() => window.fb.deleteDoc(window.fb.doc(window.db, 'courses', course.id))} className="text-red-400 hover:text-red-600"><Icon name="Trash2" size={24} /></button>}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {isAdding && (
                        <div className="fixed inset-0 z-[100] glass flex items-center justify-center p-6 backdrop-blur-xl">
                            <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="bg-white dark:bg-dark-bg p-12 rounded-[4rem] border border-primary/10 shadow-2xl max-w-lg w-full">
                                <h3 className="text-3xl font-black mb-10 italic">Create Course.</h3>
                                <div className="space-y-5">
                                    <input className="w-full p-5 rounded-3xl bg-primary/5 outline-none font-bold" placeholder="課程標題 (如：兒童水彩探索)" onChange={e=>setTemp({...temp, title:e.target.value})} />
                                    <input className="w-full p-5 rounded-3xl bg-primary/5 outline-none font-bold" placeholder="年齡區間 (如：5-8 歲)" onChange={e=>setTemp({...temp, age:e.target.value})} />
                                    <input className="w-full p-5 rounded-3xl bg-primary/5 outline-none font-bold" placeholder="學費詳情 (如：$4,500 / 8堂)" onChange={e=>setTemp({...temp, price:e.target.value})} />
                                    <textarea className="w-full p-5 rounded-3xl bg-primary/5 outline-none h-40 font-bold" placeholder="課程規劃描述內容..." onChange={e=>setTemp({...temp, desc:e.target.value})} />
                                    <div className="flex gap-4 pt-6">
                                        <button onClick={addCourse} className="flex-1 py-5 bg-primary text-white rounded-3xl font-black shadow-lg">正式發布</button>
                                        <button onClick={() => setIsAdding(false)} className="px-8 py-5 opacity-40 font-bold">取消</button>
                                    </div>
                                </div>
                            </motion.div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 子區塊：畫廊展覽 ---
        const GallerySection = ({ artworks, isAdmin, user, uploadFile }) => {
            const [isUploading, setIsUploading] = useState(false);
            const [uploadMode, setUploadMode] = useState(null); // 'file' or 'url'

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const title = prompt("作品名稱是？");
                const artist = prompt("小畫家姓名？");
                if(!title || !artist) return;

                setIsUploading(true);
                const url = await uploadFile(file, 'gallery');
                if (url) {
                    await window.fb.addDoc(window.fb.collection(window.db, 'artworks'), {
                        title, artist, imageUrl: url, createdAt: window.fb.serverTimestamp(),
                        createdBy: user?.displayName || 'Guest'
                    });
                }
                setIsUploading(false);
                setUploadMode(null);
            };

            const handleUrlUpload = async () => {
                const title = prompt("作品名稱是？");
                const artist = prompt("小畫家姓名？");
                const url = prompt("請貼上圖片連結網址 (PNG/JPG)：");
                if (title && artist && url) {
                    await window.fb.addDoc(window.fb.collection(window.db, 'artworks'), {
                        title, artist, imageUrl: url, createdAt: window.fb.serverTimestamp()
                    });
                }
                setUploadMode(null);
            };

            return (
                <div className="space-y-24 py-12">
                    <div className="flex flex-col md:flex-row justify-between items-end gap-10">
                        <div>
                            <h2 className="text-6xl font-black italic tracking-tighter underline decoration-primary/20 decoration-8 underline-offset-8">Exhibition.</h2>
                            <p className="opacity-40 font-bold tracking-[0.3em] uppercase text-xs mt-4">在這裡，每一幅畫作都在訴說一個純真的故事</p>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={() => setUploadMode('choice')} className="px-10 py-5 bg-primary text-white rounded-[2rem] font-black shadow-2xl shadow-primary/30 flex items-center gap-3 hover:-translate-y-1 transition-all">
                                <Icon name={isUploading ? "Loader" : "Plus"} size={20} className={isUploading ? 'animate-spin' : ''} />
                                {isUploading ? '傳送中...' : '分享作品'}
                            </button>
                        </div>
                    </div>

                    <div className="masonry-grid">
                        {artworks.map(art => (
                            <motion.div layout key={art.id} className="group cursor-none">
                                <div className="rounded-[3.5rem] overflow-hidden bg-white dark:bg-white/5 border border-primary/5 shadow-sm group-hover:shadow-art transition-all duration-700 relative">
                                    <img src={art.imageUrl} className="w-full h-auto object-cover group-hover:scale-110 transition-transform duration-1000" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity p-10 flex flex-col justify-end">
                                        <h5 className="text-white text-3xl font-black italic mb-2 tracking-tight">{art.title}</h5>
                                        <p className="text-white/50 text-xs font-black uppercase tracking-[0.4em]">Painter: {art.artist}</p>
                                    </div>
                                    {isAdmin && (
                                        <button onClick={() => window.fb.deleteDoc(window.fb.doc(window.db, 'artworks', art.id))} className="absolute top-8 right-8 p-3.5 bg-white/90 rounded-full text-red-500 opacity-0 group-hover:opacity-100 transition-opacity shadow-xl">
                                            <Icon name="Trash2" size={20} />
                                        </button>
                                    )}
                                </div>
                            </motion.div>
                        ))}
                    </div>

                    {/* 上傳選擇彈窗 */}
                    {uploadMode === 'choice' && (
                        <div className="fixed inset-0 z-[100] glass flex items-center justify-center p-6 backdrop-blur-xl">
                            <div className="bg-white dark:bg-dark-bg p-12 rounded-[4rem] border border-primary/10 shadow-2xl max-w-sm w-full text-center">
                                <h3 className="text-2xl font-black mb-10">選擇上傳方式</h3>
                                <div className="space-y-4">
                                    <label className="block w-full py-5 bg-primary text-white rounded-3xl font-black cursor-pointer">
                                        直接選取檔案上傳
                                        <input type="file" className="hidden" accept="image/*" onChange={handleFileUpload} />
                                    </label>
                                    <button onClick={handleUrlUpload} className="w-full py-5 border-2 border-primary text-primary rounded-3xl font-black">使用圖片網址貼上</button>
                                    <button onClick={() => setUploadMode(null)} className="w-full py-4 opacity-30 font-bold mt-4">取消</button>
                                </div>
                                <p className="text-[10px] mt-8 opacity-40 leading-relaxed font-bold uppercase tracking-widest">
                                    ※ 檔案上傳會佔用雲端空間 (Spark 方案免費 5GB)。<br/>圖片網址則不佔用空間，100% 免費。
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 子區塊：專業師資 ---
        const TeacherSection = ({ teachers, isAdmin, uploadFile }) => {
            const [isAdding, setIsAdding] = useState(false);
            const [temp, setTemp] = useState({ name: '', title: '', line: '', avatar: '' });

            const saveTeacher = async () => {
                await window.fb.addDoc(window.fb.collection(window.db, 'teachers'), temp);
                setIsAdding(false);
            };

            return (
                <div className="space-y-24 py-12">
                    <div className="flex justify-between items-center">
                        <h2 className="text-6xl font-black italic tracking-tighter underline decoration-primary/20 decoration-8 underline-offset-8">Faculty.</h2>
                        {isAdmin && <button onClick={() => setIsAdding(true)} className="w-16 h-16 rounded-full bg-primary text-white flex items-center justify-center shadow-lg hover:scale-110 transition-all"><Icon name="Plus" /></button>}
                    </div>

                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-12">
                        {teachers.map(t => (
                            <div key={t.id} className="p-16 rounded-[5rem] bg-white dark:bg-dark-card border border-primary/5 shadow-sm hover:shadow-art transition-all text-center relative group">
                                <div className="w-48 h-48 rounded-[3.5rem] overflow-hidden mb-10 mx-auto ring-[12px] ring-primary/5 group-hover:rotate-6 transition-transform">
                                    {t.avatar ? <img src={t.avatar} className="w-full h-full object-cover" /> : <div className="w-full h-full bg-primary/10 flex items-center justify-center text-primary opacity-20"><Icon name="User" size={64} /></div>}
                                </div>
                                <h4 className="text-4xl font-black mb-2 tracking-tight italic">{t.name}</h4>
                                <p className="text-xs font-black opacity-30 uppercase tracking-[0.4em] mb-12 underline decoration-primary decoration-4 underline-offset-8">{t.title}</p>
                                <a href={`https://line.me/ti/p/${t.line}`} className="inline-flex items-center gap-3 px-10 py-4 rounded-full bg-primary/5 text-primary text-xs font-black hover:bg-primary hover:text-white transition-all shadow-sm">
                                    <Icon name="MessageCircle" size={16} /> 聯繫老師 (LINE)
                                </a>
                                {isAdmin && <button onClick={() => window.fb.deleteDoc(window.fb.doc(window.db, 'teachers', t.id))} className="absolute top-10 right-10 text-red-300 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="X" /></button>}
                            </div>
                        ))}
                    </div>

                    {isAdding && (
                        <div className="fixed inset-0 z-[100] glass flex items-center justify-center p-6">
                            <div className="bg-white dark:bg-dark-bg p-12 rounded-[4rem] border border-primary/10 shadow-2xl max-w-sm w-full">
                                <h3 className="text-3xl font-black mb-10 italic">Add Mentor.</h3>
                                <div className="space-y-4">
                                    <label className="block aspect-square w-32 mx-auto dash-border rounded-[2.5rem] flex items-center justify-center cursor-pointer overflow-hidden mb-8">
                                        {temp.avatar ? <img src={temp.avatar} className="w-full h-full object-cover" /> : <Icon name="Camera" className="text-primary/30" />}
                                        <input type="file" className="hidden" onChange={async e => {
                                            const url = await uploadFile(e.target.files[0], 'teachers');
                                            if(url) setTemp({...temp, avatar: url});
                                        }} />
                                    </label>
                                    <input className="w-full p-5 rounded-3xl bg-primary/5 outline-none font-bold" placeholder="姓名 (如：妮妮老師)" value={temp.name} onChange={e=>setTemp({...temp, name:e.target.value})} />
                                    <input className="w-full p-5 rounded-3xl bg-primary/5 outline-none font-bold" placeholder="職位 (如：專業油畫導師)" value={temp.title} onChange={e=>setTemp({...temp, title:e.target.value})} />
                                    <input className="w-full p-5 rounded-3xl bg-primary/5 outline-none font-bold" placeholder="LINE ID" value={temp.line} onChange={e=>setTemp({...temp, line:e.target.value})} />
                                    <button onClick={saveTeacher} className="w-full py-5 bg-primary text-white rounded-3xl font-black shadow-lg mt-6">保存存檔</button>
                                    <button onClick={() => setIsAdding(false)} className="w-full py-4 font-bold opacity-30 mt-2">取消</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 子區塊：FAQ 問答 ---
        const FaqSection = ({ faqs, isAdmin }) => {
            const [openIdx, setOpenIdx] = useState(null);
            const [isAdding, setIsAdding] = useState(false);
            const [temp, setTemp] = useState({ q: '', a: '' });

            return (
                <div className="py-24 max-w-4xl mx-auto space-y-20 text-center">
                    <h2 className="text-6xl font-black italic underline decoration-primary/20 decoration-8 underline-offset-8">Curiosities.</h2>
                    <div className="space-y-5 text-left">
                        {faqs.map((f, i) => (
                            <div key={f.id} className="bg-white dark:bg-white/5 border border-primary/5 rounded-[3rem] overflow-hidden shadow-sm">
                                <button onClick={() => setOpenIdx(openIdx === i ? null : i)} className="w-full p-10 flex justify-between items-center text-left">
                                    <span className="font-black text-2xl tracking-tight">{f.q}</span>
                                    <Icon name={openIdx === i ? "Minus" : "Plus"} className={`text-primary transition-transform ${openIdx === i ? 'rotate-180' : ''}`} />
                                </button>
                                {openIdx === i && (
                                    <div className="px-10 pb-10 font-bold opacity-40 text-lg leading-relaxed border-t border-primary/5 pt-8">{f.a}</div>
                                )}
                                {isAdmin && <button onClick={()=>window.fb.deleteDoc(window.fb.doc(window.db, 'faqs', f.id))} className="mx-10 mb-6 text-red-300 text-xs font-black uppercase tracking-widest">刪除問答條目</button>}
                            </div>
                        ))}
                    </div>
                    {isAdmin && (
                        <button onClick={()=>setIsAdding(true)} className="px-12 py-5 bg-primary/5 text-primary rounded-3xl font-black border border-primary/10">新增問答條目 +</button>
                    )}
                    {isAdding && (
                        <div className="fixed inset-0 z-[100] glass flex items-center justify-center p-6 backdrop-blur-xl">
                            <div className="bg-white dark:bg-dark-bg p-12 rounded-[4rem] border border-primary/10 shadow-2xl max-w-lg w-full">
                                <h3 className="text-3xl font-black mb-10 italic">Add FAQ.</h3>
                                <div className="space-y-4">
                                    <input className="w-full p-5 rounded-3xl bg-primary/5 outline-none font-bold" placeholder="常見問題描述" onChange={e=>setTemp({...temp, q:e.target.value})} />
                                    <textarea className="w-full p-5 rounded-3xl bg-primary/5 outline-none h-48 font-bold" placeholder="詳細解答內容..." onChange={e=>setTemp({...temp, a:e.target.value})} />
                                    <button onClick={async ()=>{await window.fb.addDoc(window.fb.collection(window.db, 'faqs'), temp); setIsAdding(false);}} className="w-full py-5 bg-primary text-white rounded-3xl font-black shadow-lg">發布條目</button>
                                    <button onClick={()=>setIsAdding(false)} className="w-full py-4 opacity-30 font-bold">取消</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 子區塊：會員中心 & 管理後台 ---
        const MemberSection = ({ user, isAdmin, onVerify, studio, onUpdate }) => (
            <div className="max-w-5xl mx-auto py-24 space-y-16">
                {!user ? (
                    <div className="text-center py-40 space-y-12 bg-white dark:bg-white/5 rounded-[6rem] border border-primary/5 shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-80 h-80 bg-primary/5 rounded-full -mr-40 -mt-40 blur-[100px]"></div>
                        <Icon name="User" size={100} className="mx-auto text-primary/10" />
                        <h2 className="text-6xl font-black italic tracking-tighter italic">Join Art House.</h2>
                        <p className="opacity-30 font-bold tracking-widest max-w-sm mx-auto text-lg leading-relaxed">登入 Google 帳號，開啟專屬的藝術旅程、收藏喜愛的作品與管理後台權限。</p>
                        <button onClick={() => window.fb.signInWithPopup(window.auth, window.googleProvider)} className="px-16 py-7 bg-primary text-white rounded-[3rem] font-black shadow-2xl shadow-primary/40 active:scale-95 transition-all text-xl">Google 快速登入</button>
                    </div>
                ) : (
                    <div className="grid md:grid-cols-3 gap-12">
                        {/* 用戶名片 */}
                        <div className="md:col-span-1 bg-white dark:bg-dark-card p-16 rounded-[5rem] border border-primary/5 shadow-sm text-center">
                            <div className="relative inline-block mb-12">
                                <img src={user.photoURL} className="w-40 h-40 rounded-[3.5rem] mx-auto ring-[14px] ring-primary/5 p-1.5 transform -rotate-3 hover:rotate-0 transition-all duration-500" />
                                {isAdmin && <div className="absolute top-0 right-0 bg-primary text-white p-3 rounded-full shadow-lg ring-8 ring-white dark:ring-dark-bg"><Icon name="ShieldCheck" size={24} /></div>}
                            </div>
                            <h3 className="text-4xl font-black mb-2 italic tracking-tight">{user.displayName}</h3>
                            <p className="text-[11px] font-black opacity-30 uppercase tracking-[0.4em] mb-12 italic underline decoration-primary decoration-[6px] underline-offset-[10px]">{isAdmin ? 'Grand Master Admin' : 'Art Studio Member'}</p>
                            
                            {!isAdmin && (
                                <div className="mb-12 p-8 bg-primary/5 rounded-[2.5rem] border border-primary/10 space-y-5">
                                    <p className="text-[10px] font-black opacity-30 uppercase tracking-widest italic tracking-[0.2em]">Verify Admin Access</p>
                                    <input type="password" placeholder="密碼：720205" className="w-full p-5 bg-white dark:bg-dark-bg border border-primary/10 rounded-3xl text-center font-black text-sm outline-none focus:border-primary transition-all shadow-inner" onKeyDown={e => e.key === 'Enter' && onVerify(e.target.value)} />
                                </div>
                            )}
                            
                            <button onClick={() => { window.fb.signOut(window.auth); sessionStorage.removeItem('is_nini_admin'); location.reload(); }} className="text-red-500 font-black text-xs underline underline-offset-[12px] decoration-2 hover:text-red-600 transition-colors">安全退出系統</button>
                        </div>

                        {/* 工作室核心配置 (管理者) */}
                        <div className="md:col-span-2 bg-light-text dark:bg-white/5 p-16 md:p-24 rounded-[5rem] text-light-bg space-y-20 shadow-2xl relative overflow-hidden group">
                            <div className="absolute -top-40 -right-40 w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px] opacity-0 group-hover:opacity-100 transition-opacity duration-1000"></div>
                            <h3 className="text-6xl font-black italic tracking-tighter">Core Config.</h3>
                            <div className="grid gap-16 relative z-10">
                                {[
                                    {label: '地址', icon: 'MapPin', val: studio.address, field: 'address'},
                                    {label: '電話', icon: 'Phone', val: studio.phone, field: 'phone'},
                                    {label: '信箱', icon: 'Mail', val: studio.email, field: 'email'}
                                ].map(item => (
                                    <div key={item.field} className="flex gap-10 group/item">
                                        <div className="w-20 h-20 rounded-[2rem] bg-white/10 flex items-center justify-center text-primary group-hover/item:bg-primary group-hover/item:text-white transition-all shadow-inner"><Icon name={item.icon} size={32} /></div>
                                        <div className="flex-grow">
                                            <p className="text-[11px] font-black opacity-30 uppercase tracking-[0.4em] mb-4 italic">Studio {item.label}</p>
                                            {isAdmin ? (
                                                <input className="bg-transparent border-b-4 border-white/10 w-full outline-none focus:border-primary py-3 text-3xl font-black italic tracking-tight transition-all" defaultValue={item.val} onBlur={e=>onUpdate(item.field, e.target.value)} />
                                            ) : (
                                                <p className="font-black text-3xl italic tracking-tight">{item.val}</p>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
